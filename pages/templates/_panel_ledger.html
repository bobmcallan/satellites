{{define "_panel_ledger.html"}}
<div data-testid="panel-ledger-body">
  <p class="panel-actions">
    <a href="/projects/{{.Project.ID}}/ledger" data-testid="panel-ledger-open">Open ledger →</a>
  </p>
  {{if not .Composite.LedgerRecent}}
    <p class="muted" data-testid="panel-ledger-empty">No ledger entries</p>
  {{else}}
    <table class="panel-table panel-table-ledger" data-testid="panel-ledger-table">
      <thead>
        <tr>
          <th class="col-type">type</th>
          <th class="col-story">story</th>
          <th class="col-content">content</th>
          <th class="col-updated">created</th>
        </tr>
      </thead>
      <tbody>
      {{range .Composite.LedgerRecent}}
        <tr data-testid="panel-ledger-row-{{.ID}}">
          <td class="col-type"><code class="type-pill">{{.Type}}</code></td>
          <td class="col-story">{{if .StoryID}}<a href="/projects/{{$.Project.ID}}/ledger?story_id={{.StoryID}}"><code>{{.StoryID}}</code></a>{{end}}</td>
          <td class="col-content">{{.Content}}</td>
          <td class="col-updated muted">{{.CreatedAt}}</td>
        </tr>
      {{end}}
      </tbody>
    </table>
  {{end}}
</div>
{{end}}
