services:
  surrealdb:
    image: surrealdb/surrealdb:v3.0.0
    command: start --user root --pass root
    ports:
      - "8000:8000"
    volumes:
      - surrealdb-data:/data
    healthcheck:
      test: ["CMD", "/surreal", "is-ready", "--endpoint", "http://localhost:8000"]
      interval: 5s
      timeout: 3s
      retries: 20
      start_period: 5s

  satellites:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    entrypoint: ["/app/docker/entrypoint-local.sh"]
    ports:
      - "8080:8080"
    env_file:
      - ../.env
    environment:
      # Story_b7b705dd: TOML is the canonical local-dev config carrier;
      # .env above remains the runtime override surface.
      SATELLITES_CONFIG: /app/satellites.toml
    volumes:
      - ../docs:/app/docs:ro
      - ../scripts/satellites.toml:/app/satellites.toml:ro
    depends_on:
      surrealdb:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:8080/healthz"]
      interval: 10s
      timeout: 3s
      retries: 5

volumes:
  surrealdb-data:
