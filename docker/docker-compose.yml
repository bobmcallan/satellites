services:
  surrealdb:
    image: surrealdb/surrealdb:v3.0.0
    command: start --user root --pass root
    ports:
      - "8000:8000"
    volumes:
      - surrealdb-data:/data

  satellites:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    entrypoint: ["/app/docker/entrypoint-local.sh"]
    ports:
      - "8080:8080"
    environment:
      PORT: "8080"
      ENV: "dev"
      LOG_LEVEL: "info"
      DEV_MODE: "true"
      DB_DSN: "ws://surrealdb:8000/rpc"
    volumes:
      - ../docs:/app/docs:ro
    depends_on:
      surrealdb:
        condition: service_started
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:8080/healthz"]
      interval: 10s
      timeout: 3s
      retries: 5

volumes:
  surrealdb-data:
