# satellites.toml — copy to scripts/satellites.toml (gitignored) and
# customise. The local docker stack (scripts/deploy.sh + docker/
# docker-compose.yml) bind-mounts scripts/satellites.toml into the
# container at /app/satellites.toml and sets SATELLITES_CONFIG to that
# path so the binary loads from it (story_b7b705dd).
#
# Resolution order (highest precedence first):
#   1. Process env var (set via docker-compose env_file: ../.env)
#   2. This TOML file (mounted at /app/satellites.toml)
#   3. In-code default (internal/config/config.go::defaults)
#
# Every key here is the in-code default. Uncomment and edit to override.
# `.env` continues to work as the runtime override surface — values set
# there beat anything in the TOML.
#
# All env var overrides are SATELLITES_-prefixed. The service ALWAYS
# boots: malformed values, missing-but-recommended prod secrets, and
# OAuth pair mismatches degrade to a startup warning (logged via arbor)
# and the affected field falls back to the code default.

# HTTP listen port (1..65535). Env override: SATELLITES_PORT.
# port = 8080

# Deployment environment: "dev" or "prod". Default "prod".
# Env override: SATELLITES_ENV.
# env = "prod"

# Arbor log level: trace, debug, info, warn, error.
# Env override: SATELLITES_LOG_LEVEL.
# log_level = "info"

# Enables dev-mode quick-signin and DEV portal affordances. Default
# false. When env="dev" and dev_mode is unset, dev_mode resolves to true
# automatically. Env override: SATELLITES_DEV_MODE.
# dev_mode = false

# SurrealDB connection string. Recommended in prod; empty boots the
# server without DB-backed verbs (a warning is logged in prod).
# Env override: SATELLITES_DB_DSN.
# db_dsn = ""

# Fixed credential username for DevMode signin. Defaults to
# "dev@satellites.local" when DevMode is active, empty otherwise.
# Env override: SATELLITES_DEV_USERNAME.
# dev_username = "dev@satellites.local"

# Fixed credential password for DevMode signin. Never logged. Defaults
# to "dev123" when DevMode is active, empty otherwise.
# Env override: SATELLITES_DEV_PASSWORD.
# dev_password = "dev123"

# Google OAuth client id. Pair with google_client_secret. Empty disables
# the provider. A half-set credential disables the provider with a
# warning. Env override: SATELLITES_GOOGLE_CLIENT_ID.
# google_client_id = ""

# Google OAuth client secret. Never logged.
# Env override: SATELLITES_GOOGLE_CLIENT_SECRET.
# google_client_secret = ""

# GitHub OAuth client id. Pair with github_client_secret. Empty disables
# the provider. Env override: SATELLITES_GITHUB_CLIENT_ID.
# github_client_id = ""

# GitHub OAuth client secret. Never logged.
# Env override: SATELLITES_GITHUB_CLIENT_SECRET.
# github_client_secret = ""

# Absolute base URL the auth handlers append the per-provider callback
# path to. Defaults to http://localhost:<port> when DevMode is active,
# empty otherwise. Recommended in prod when any provider is configured.
# Env override: SATELLITES_OAUTH_REDIRECT_BASE_URL.
# oauth_redirect_base_url = "http://localhost:8080"

# How long the MCP-side OAuth token validator caches a successful
# provider lookup. Range 1s..24h. Default 4h.
# Env override: SATELLITES_OAUTH_TOKEN_CACHE_TTL.
# oauth_token_cache_ttl = "4h"

# Bearer tokens accepted on /mcp when a session cookie is absent. TOML
# uses a native array; env (SATELLITES_API_KEYS) uses a comma-separated
# string. Empty disables Bearer-API-key auth (a warning is logged in prod).
# api_keys = ["key-one", "key-two"]

# Container-side path containing the mounted docs volume read by
# document_ingest_file. Env override: SATELLITES_DOCS_DIR.
# docs_dir = "/app/docs"

# When true, MCP verbs outside the bootstrap allowlist are rejected
# unless the caller holds a role-grant whose effective verb allowlist
# covers the tool. Env override: SATELLITES_GRANTS_ENFORCED.
# grants_enforced = false

# Google AI Studio key for the close-time reviewer. Empty disables the
# Gemini reviewer (falls back to AcceptAll with a warning). Never logged.
# Env override: SATELLITES_GEMINI_API_KEY.
# gemini_api_key = ""

# Gemini model id for the close-time reviewer. Default gemini-2.5-flash.
# Env override: SATELLITES_GEMINI_REVIEW_MODEL.
# gemini_review_model = "gemini-2.5-flash"

# Embeddings backend: "gemini", "stub", or "none" (default).
# Env override: SATELLITES_EMBEDDINGS_PROVIDER.
# embeddings_provider = "none"

# Embeddings model id (provider-specific).
# Env override: SATELLITES_EMBEDDINGS_MODEL.
# embeddings_model = ""

# Embeddings provider API key. Required when provider=gemini. Never logged.
# Env override: SATELLITES_EMBEDDINGS_API_KEY.
# embeddings_api_key = ""

# Embeddings provider HTTP base URL override. Empty uses the canonical endpoint.
# Env override: SATELLITES_EMBEDDINGS_BASE_URL.
# embeddings_base_url = ""

# Optional embeddings vector dimensionality override. Zero leaves the
# provider's default. Env override: SATELLITES_EMBEDDINGS_DIMENSION.
# embeddings_dimension = 0
